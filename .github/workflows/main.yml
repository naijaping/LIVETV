name: RUN SCRIPT LISTA
on:
  push:
    branches: [main, master]
    paths:
      - 'scripts/lista.py'
  schedule:
    - cron: '0 * * * *'  # ogni ora
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0  # Questo scarica TUTTA la storia del branch

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml playwright bs4 rapidfuzz fuzzywuzzy python-Levenshtein python-dateutil python-dotenv pillow cloudscraper
          playwright install
          playwright install-deps

      - name: Run Script
        run: python scripts/lista.py
        env:
          LINK_DADDYBYPASS: ${{ secrets.LINK_DADDYBYPASS }}

      - name: Show git status before commit
        run: |
          git status
          git diff --stat

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          
          git add -A
          
          if ! git diff --quiet && ! git diff --staged --quiet; then
            git commit -m "Update liste - $(date '+%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main  # Integra cambiamenti remoti
            git push origin main
          fi
