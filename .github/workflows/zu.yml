name: Zappr & Uaznao

on:
  schedule:
    - cron: '10 * * * *'
  workflow_dispatch:

jobs:
  download-m3u:
    runs-on: ubuntu-latest
    permissions:        # Added permissions to allow pushing changes
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests 

      - name: Avvio zappr uaznao
        run: python scripts/zappr-uaznao.py
        env:
          UAZNAO_URL: ${{ secrets.UAZNAO_URL }}
      
      - name: Commit and push if changed
        run: |
          git config --global user.name 'Github Actions Bot'
          git config --global user.email 'actions@github.com'
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update Zappr & Uaznao - $(date '+%Y-%m-%d %H:%M:%S')" && git push)
